name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run CLI smoke test
        run: python -m day_captain morning-digest --now 2026-03-07T08:00:00+00:00

      - name: Lint Logics docs
        run: python logics/skills/logics-doc-linter/scripts/logics_lint.py --require-status

      - name: Audit Logics workflow
        run: python logics/skills/logics-flow-manager/scripts/workflow_audit.py --group-by-doc
