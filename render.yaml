services:
  - type: web
    name: day-captain
    env: python
    plan: starter
    buildCommand: pip install -e .
    startCommand: gunicorn --bind 0.0.0.0:$PORT "day_captain.web:create_web_app()"
    healthCheckPath: /healthz
    envVars:
      - key: DAY_CAPTAIN_ENV
        value: production
      - key: DAY_CAPTAIN_DELIVERY_MODE
        value: graph_send
      - key: DAY_CAPTAIN_GRAPH_SEND_ENABLED
        value: "true"
      - key: DAY_CAPTAIN_GRAPH_BASE_URL
        value: https://graph.microsoft.com/v1.0
      - key: DAY_CAPTAIN_GRAPH_SCOPES
        value: User.Read,Mail.Read,Calendars.Read,Mail.Send
      - key: DAY_CAPTAIN_GRAPH_TENANT_ID
        sync: false
      - key: DAY_CAPTAIN_GRAPH_CLIENT_ID
        sync: false
      - key: DAY_CAPTAIN_GRAPH_REFRESH_TOKEN
        sync: false
      - key: DAY_CAPTAIN_GRAPH_USER_ID
        sync: false
      - key: DAY_CAPTAIN_DISPLAY_TIMEZONE
        sync: false
      - key: DAY_CAPTAIN_DIGEST_LANGUAGE
        sync: false
      - key: DAY_CAPTAIN_LLM_LANGUAGE
        sync: false
      - key: DAY_CAPTAIN_LLM_PROVIDER
        value: openai
      - key: DAY_CAPTAIN_LLM_MODEL
        value: gpt-5-mini
      - key: DAY_CAPTAIN_LLM_API_KEY
        sync: false
      - key: DAY_CAPTAIN_DATABASE_URL
        sync: false
      - key: DAY_CAPTAIN_DATABASE_SSL_MODE
        value: require
      - key: DAY_CAPTAIN_JOB_SECRET
        sync: false
